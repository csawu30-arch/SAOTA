<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Dog Matcher Pro - New Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    body {
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .swiper {
      width: 340px;
      height: 500px;
      overflow: visible !important;
    }

    .swiper-slide {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      backface-visibility: hidden;
    }

    .proyectil {
      position: fixed;
      width: 340px;
      height: 500px;
      border-radius: 24px;
      z-index: 99999;
      pointer-events: none;
      transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .card-image {
      flex: 1;
      width: 100%;
      background-size: cover;
      background-position: center;
      position: relative;
      background-color: #dfe6e9;
    }

    .card-image::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    .card-info {
      padding: 20px;
      background: white;
      color: #2d3436;
    }

    .card-info h3 { margin: 0; font-size: 1.4rem; font-weight: 700; }
    .card-info h4 { margin: 4px 0; font-size: 1rem; color: #636e72; font-weight: 400; }
    .card-info p { margin: 12px 0 0; font-size: 0.9rem; color: #2d3436; line-height: 1.5; }

    .actions {
      margin-top: 40px;
      display: flex;
      gap: 25px;
    }

    button {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
    }

    button:hover { transform: scale(1.1); }
    button:active { transform: scale(0.9); }

    .btn-dislike { color: #ff5252; border: 1px solid #ff5252; }
    .btn-like { color: #00e676; border: 1px solid #00e676; }
  </style>
</head>

<body>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper" id="wrapper"></div>
  </div>

  <div class="actions">
    <button class="btn-dislike" id="dislike" title="Dislike">✖</button>
    <button class="btn-like" id="like" title="Like">❤</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    const wrapper = document.getElementById('wrapper');
    let cardCount = 0;

    const nombres = ["Toby", "Luna", "Max", "Bella", "Rocky", "Daisy", "Bruno", "Coco", "Simba", "Molly", "Zeus", "Lola"];
    
    const datosRazas = [
      { raza: "Golden Retriever", img: "http://googleusercontent.com/image_collection/image_retrieval/6754221256453728135_0" },
      { raza: "Pastor Alemán", img: "http://googleusercontent.com/image_collection/image_retrieval/10335993948280057636_0" },
      { raza: "Bulldog Francés", img: "http://googleusercontent.com/image_collection/image_retrieval/8195455122236001596_0" },
      { raza: "Beagle", img: "http://googleusercontent.com/image_collection/image_retrieval/14772894383505314281_0" },
      { raza: "Poodle", img: "http://googleusercontent.com/image_collection/image_retrieval/5598039690140277285_0" },
      { raza: "Labrador", img: "http://googleusercontent.com/image_collection/image_retrieval/4620216830492728405_0" },
      { raza: "Siberian Husky", img: "http://googleusercontent.com/image_collection/image_retrieval/17599338628651252326_0" },
      { raza: "Dachshund", img: "http://googleusercontent.com/image_collection/image_retrieval/4331298890301934070_0" }
    ];

    const descripciones = [
      "Me encanta perseguir pelotas en el parque.",
      "Soy muy obediente y aprendo trucos rápido.",
      "Busco a alguien para largas siestas al sol.",
      "Soy el experto número uno en pedir comida.",
      "Amo los paseos por la montaña y el agua.",
      "Soy pequeño pero con un corazón gigante.",
      "No muerdo, solo doy muchos lengüetazos.",
      "Busco un hogar lleno de amor y galletas."
    ];

    function createCard() {
      cardCount++;
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      const n = nombres[Math.floor(Math.random() * nombres.length)];
      const rData = datosRazas[Math.floor(Math.random() * datosRazas.length)];
      const d = descripciones[Math.floor(Math.random() * descripciones.length)];
      const age = 1 + Math.floor(Math.random() * 10);
      
      slide.innerHTML = `
        <div class="card-image" style="background-image: url('${rData.img}')"></div>
        <div class="card-info">
          <h3>${n}, ${age} años</h3>
          <h4>🐾 ${rData.raza}</h4>
          <p>"${d}"</p>
        </div>
      `;
      return slide;
    }

    for (let i = 0; i < 8; i++) wrapper.appendChild(createCard());

    const swiper = new Swiper(".mySwiper", {
      effect: "cards",
      allowTouchMove: false,
      cardsEffect: { perSlideOffset: 12, perSlideRotate: 3, slideShadows: false }
    });

    function swipe(type) {
      const activeSlide = swiper.slides[swiper.activeIndex];
      if (!activeSlide) return;

      const rect = activeSlide.getBoundingClientRect();
      const proyectil = document.createElement('div');
      proyectil.className = 'proyectil';
      proyectil.innerHTML = activeSlide.innerHTML;
      
      proyectil.style.top = rect.top + 'px';
      proyectil.style.left = rect.left + 'px';
      document.body.appendChild(proyectil);

      activeSlide.style.visibility = "hidden"; 
      swiper.appendSlide(createCard());
      swiper.slideNext(0);

      setTimeout(() => {
        const moveX = type === 'like' ? 1200 : -1200;
        const rotate = type === 'like' ? 45 : -45;
        proyectil.style.transform = `translate(${moveX}px, -100px) rotate(${rotate}deg)`;
        proyectil.style.opacity = "0";
      }, 20);

      setTimeout(() => {
        proyectil.remove();
        if (swiper.activeIndex > 15) swiper.removeSlide(0);
      }, 850);
    }

    document.getElementById('like').onclick = () => swipe('like');
    document.getElementById('dislike').onclick = () => swipe('dislike');
  </script>
</body>

</html>
